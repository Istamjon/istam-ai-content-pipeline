name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript build
        run: npm run build

      - name: Validate langgraph.json paths
        run: npm run lint:langgraph-json

      - name: Unit tests
        run: npm test

      - name: Smoke — image prompt builder
        run: |
          node --input-type=module -e "
          import { buildPremiumImagePrompt } from './dist/config/imagePrompt.js';
          const r = buildPremiumImagePrompt('Agentic RAG', 'GPU retrieval', { preset: 'workflow' });
          const p = r.prompt.toLowerCase();
          if (!p.includes('#036158') || !p.includes('no office') || !p.includes('grid')) {
            console.error('prompt missing layout/brand rules', r.prompt.slice(0, 200));
            process.exit(1);
          }
          if (r.preset !== 'workflow') process.exit(1);
          console.log('OK preset=', r.preset, 'len=', r.prompt.length);
          "

      - name: Smoke — brand-fit + sources
        run: |
          node --input-type=module -e "
          import { scoreBrandFit } from './dist/lib/brandFit.js';
          import { sources } from './dist/config/brand.js';
          if (sources.length < 4) { console.error('too few sources', sources.length); process.exit(1); }
          const ok = scoreBrandFit({
            title: 'LangGraph multi-agent with TypeScript',
            url: 'https://actualize.co/ai-engineering-blog/x',
            text: 'AI agents orchestration Next.js',
          });
          if (!ok.ok || ok.score < 4) { console.error('brand-fit failed', ok); process.exit(1); }
          const bad = scoreBrandFit({
            title: 'Fortnite season tips',
            url: 'https://example.com/game',
            text: 'gameplay loot',
          });
          if (bad.ok) { console.error('should reject gaming', bad); process.exit(1); }
          console.log('OK sources=', sources.length, 'fitScore=', ok.score);
          "

      # Full eslint currently fails on legacy process.env usage outside env.ts.
      # Keep as non-blocking report until cleaned up.
      - name: ESLint (report only)
        continue-on-error: true
        run: npm run lint

  docker:
    name: Docker image
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: istam-ai-content-pipeline:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
