# On-demand: set TELEGRAM_ADMIN_IDS on VDS and recreate container.
# Usage: gh workflow run set-telegram-admin.yml -f admin_ids=505432394

name: Set Telegram Admin

on:
  workflow_dispatch:
    inputs:
      admin_ids:
        description: "Comma-separated Telegram user IDs"
        required: true
        default: "505432394"

jobs:
  set-admin:
    name: Set TELEGRAM_ADMIN_IDS on VDS
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check secrets
        env:
          VDS_HOST: ${{ secrets.VDS_HOST }}
          VDS_USER: ${{ secrets.VDS_USER }}
          VDS_SSH_KEY: ${{ secrets.VDS_SSH_KEY }}
        run: |
          [ -n "$VDS_HOST" ] && [ -n "$VDS_USER" ] && [ -n "$VDS_SSH_KEY" ] || {
            echo "::error::Missing VDS_* secrets"
            exit 1
          }

      - name: Update .env and restart pipeline
        uses: appleboy/ssh-action@v1.2.0
        env:
          ADMIN_IDS: ${{ github.event.inputs.admin_ids }}
          REMOTE_APP_DIR: ${{ secrets.VDS_PATH }}
        with:
          host: ${{ secrets.VDS_HOST }}
          username: ${{ secrets.VDS_USER }}
          key: ${{ secrets.VDS_SSH_KEY }}
          port: ${{ secrets.VDS_PORT || 22 }}
          command_timeout: 10m
          # false: multi-line bash (if/for) must not be split by drone-ssh
          script_stop: false
          envs: ADMIN_IDS,REMOTE_APP_DIR
          script: |
            set -e
            echo "USER=$(whoami) HOME=$HOME ADMIN_IDS=${ADMIN_IDS:-}"
            APP_DIR="${REMOTE_APP_DIR:-}"
            if [ -z "$APP_DIR" ] || [ ! -d "$APP_DIR" ]; then
              if [ -f "$HOME/istam-ai-content-pipeline/.env" ]; then APP_DIR="$HOME/istam-ai-content-pipeline"; fi
            fi
            if [ -z "$APP_DIR" ] || [ ! -d "$APP_DIR" ]; then
              if [ -f /root/istam-ai-content-pipeline/.env ]; then APP_DIR=/root/istam-ai-content-pipeline; fi
            fi
            if [ -z "$APP_DIR" ] || [ ! -d "$APP_DIR" ]; then
              if [ -f /opt/istam-ai-content-pipeline/.env ]; then APP_DIR=/opt/istam-ai-content-pipeline; fi
            fi
            echo "APP_DIR=$APP_DIR"
            test -n "$APP_DIR"
            test -d "$APP_DIR"
            cd "$APP_DIR"
            test -f .env
            if grep -q '^TELEGRAM_ADMIN_IDS=' .env; then
              sed -i "s|^TELEGRAM_ADMIN_IDS=.*|TELEGRAM_ADMIN_IDS=${ADMIN_IDS}|" .env
            else
              printf '\nTELEGRAM_ADMIN_IDS=%s\n' "$ADMIN_IDS" >> .env
            fi
            if ! grep -q '^TELEGRAM_BOT_INBOUND=' .env; then
              printf 'TELEGRAM_BOT_INBOUND=true\n' >> .env
            fi
            echo "=== TELEGRAM_ADMIN_IDS ==="
            grep '^TELEGRAM_ADMIN_IDS=' .env
            docker compose up -d --force-recreate
            sleep 10
            docker compose ps
            docker compose logs --tail=40
            echo "=== DONE ==="
