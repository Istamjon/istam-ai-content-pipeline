# One-shot / on-demand: set TELEGRAM_ADMIN_IDS on VDS and recreate container.
# Usage: gh workflow run set-telegram-admin.yml -f admin_ids=505432394

name: Set Telegram Admin

on:
  workflow_dispatch:
    inputs:
      admin_ids:
        description: "Comma-separated Telegram user IDs"
        required: true
        default: "505432394"

jobs:
  set-admin:
    name: Set TELEGRAM_ADMIN_IDS on VDS
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check secrets
        env:
          VDS_HOST: ${{ secrets.VDS_HOST }}
          VDS_USER: ${{ secrets.VDS_USER }}
          VDS_SSH_KEY: ${{ secrets.VDS_SSH_KEY }}
        run: |
          [ -n "$VDS_HOST" ] && [ -n "$VDS_USER" ] && [ -n "$VDS_SSH_KEY" ] || {
            echo "::error::Missing VDS_* secrets"
            exit 1
          }

      - name: Update .env and restart pipeline
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VDS_HOST }}
          username: ${{ secrets.VDS_USER }}
          key: ${{ secrets.VDS_SSH_KEY }}
          port: ${{ secrets.VDS_PORT || 22 }}
          command_timeout: 10m
          script_stop: true
          script: |
            set -uo pipefail
            ADMIN_IDS="${{ github.event.inputs.admin_ids }}"
            echo "ADMIN_IDS=$ADMIN_IDS HOME=$HOME USER=$(whoami)"

            APP_DIR="${{ secrets.VDS_PATH }}"
            if [ -z "$APP_DIR" ] || [ ! -d "$APP_DIR" ]; then
              for cand in \
                "$HOME/istam-ai-content-pipeline" \
                /root/istam-ai-content-pipeline \
                /opt/istam-ai-content-pipeline \
                /var/www/istam-ai-content-pipeline
              do
                if [ -d "$cand" ] && [ -f "$cand/.env" ]; then
                  APP_DIR="$cand"
                  break
                fi
              done
            fi

            echo "APP_DIR=$APP_DIR"
            if [ -z "$APP_DIR" ] || [ ! -d "$APP_DIR" ]; then
              echo "::error::Could not find app dir"
              ls -la "$HOME" || true
              exit 1
            fi
            cd "$APP_DIR" || exit 1

            if [ ! -f .env ]; then
              echo "::error::.env missing in $APP_DIR"
              ls -la
              exit 1
            fi

            if grep -q '^TELEGRAM_ADMIN_IDS=' .env; then
              sed -i "s|^TELEGRAM_ADMIN_IDS=.*|TELEGRAM_ADMIN_IDS=${ADMIN_IDS}|" .env
            else
              printf '\nTELEGRAM_ADMIN_IDS=%s\n' "$ADMIN_IDS" >> .env
            fi
            if ! grep -q '^TELEGRAM_BOT_INBOUND=' .env; then
              printf 'TELEGRAM_BOT_INBOUND=true\n' >> .env
            fi

            echo "=== TELEGRAM_ADMIN_IDS line ==="
            grep '^TELEGRAM_ADMIN_IDS=' .env || true

            echo "=== recreate container ==="
            docker compose up -d --force-recreate
            sleep 10
            docker compose ps
            docker compose logs --tail=50 || true
            echo "=== DONE admin_ids=${ADMIN_IDS} ==="
