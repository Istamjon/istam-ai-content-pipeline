# Force one pipeline run on VDS (with optional brand face from secret).
# After deploy: set BRAND_FACE_B64 secret, then run this workflow.
#
#   gh secret set BRAND_FACE_B64 < face.b64
#   gh workflow run force-one-post.yml

name: Force One Post VDS

on:
  workflow_dispatch:

concurrency:
  group: deploy-vds
  cancel-in-progress: false

jobs:
  run-once:
    name: One publish with brand face
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check secrets
        env:
          VDS_HOST: ${{ secrets.VDS_HOST }}
          VDS_USER: ${{ secrets.VDS_USER }}
          VDS_SSH_KEY: ${{ secrets.VDS_SSH_KEY }}
        run: |
          [ -n "$VDS_HOST" ] && [ -n "$VDS_USER" ] && [ -n "$VDS_SSH_KEY" ] || {
            echo "::error::Missing VDS_* secrets"
            exit 1
          }

      - name: Checkout (for face.jpg)
        uses: actions/checkout@v4

      - name: SCP brand face to VDS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VDS_HOST }}
          username: ${{ secrets.VDS_USER }}
          key: ${{ secrets.VDS_SSH_KEY }}
          port: ${{ secrets.VDS_PORT || 22 }}
          source: "data/brand/face.jpg"
          target: "/tmp/istam-brand-face/"
          strip_components: 0

      - name: Place face + set 4/day limits + run pipeline once
        uses: appleboy/ssh-action@v1.2.0
        env:
          REMOTE_APP_DIR: ${{ secrets.VDS_PATH }}
        with:
          host: ${{ secrets.VDS_HOST }}
          username: ${{ secrets.VDS_USER }}
          key: ${{ secrets.VDS_SSH_KEY }}
          port: ${{ secrets.VDS_PORT || 22 }}
          command_timeout: 40m
          script_stop: false
          envs: REMOTE_APP_DIR
          script: |
            set -e
            APP_DIR="${REMOTE_APP_DIR:-}"
            if [ -z "$APP_DIR" ] || [ ! -d "$APP_DIR" ]; then
              [ -d "$HOME/istam-ai-content-pipeline" ] && APP_DIR="$HOME/istam-ai-content-pipeline"
            fi
            if [ -z "$APP_DIR" ] || [ ! -d "$APP_DIR" ]; then
              [ -d /root/istam-ai-content-pipeline ] && APP_DIR=/root/istam-ai-content-pipeline
            fi
            if [ -z "$APP_DIR" ] || [ ! -d "$APP_DIR" ]; then
              [ -d /opt/istam-ai-content-pipeline ] && APP_DIR=/opt/istam-ai-content-pipeline
            fi
            echo "APP_DIR=$APP_DIR"
            test -n "$APP_DIR" && test -d "$APP_DIR"
            cd "$APP_DIR"
            test -f .env

            upsert() {
              key="$1"; val="$2"
              if [ -z "$val" ]; then return 0; fi
              if grep -q "^${key}=" .env; then
                sed -i "s|^${key}=.*|${key}=${val}|" .env
              else
                printf '\n%s=%s\n' "$key" "$val" >> .env
              fi
            }

            # Keep random 3–6 policy; platform caps must be >= max slots
            upsert CRON_SLOTS_MIN 3
            upsert CRON_SLOTS_MAX 6
            upsert CRON_SLOTS_PER_DAY 4
            upsert CRON_RANDOM true
            upsert DAILY_LIMIT_TELEGRAM 6
            upsert DAILY_LIMIT_LINKEDIN 6
            upsert DAILY_LIMIT_FACEBOOK 6
            upsert DAILY_LIMIT_INSTAGRAM 6
            upsert DAILY_LIMIT_THREADS 6
            upsert DAILY_LIMIT_X 6
            upsert DAILY_LIMIT_BLOGGER 6
            upsert DRY_RUN false
            upsert CRON_RUN_ON_START false
            upsert TZ Asia/Tashkent

            mkdir -p data/brand data/images data/tokens
            # SCP lands as /tmp/istam-brand-face/data/brand/face.jpg
            if [ -f /tmp/istam-brand-face/data/brand/face.jpg ]; then
              cp -f /tmp/istam-brand-face/data/brand/face.jpg data/brand/face.jpg
            elif [ -f /tmp/istam-brand-face/face.jpg ]; then
              cp -f /tmp/istam-brand-face/face.jpg data/brand/face.jpg
            fi
            ls -la data/brand/face.jpg
            chown -R 10001:10001 data 2>/dev/null || true

            # Pull latest code if deploy not finished yet
            git fetch origin main 2>/dev/null || true
            git reset --hard origin/main 2>/dev/null || true

            # Rebuild image; use one-shot `compose run` (avoids network name races)
            docker compose build --pull || docker compose build
            docker compose down --remove-orphans || true
            docker rm -f istam-ai-pipeline 2>/dev/null || true
            sleep 2

            # Mount repo scripts/ (uses top-level await as .mjs module file — not node -e)
            test -f scripts/force-face-check.mjs
            test -f scripts/force-one-pipeline.mjs

            echo "=== face check (one-shot container) ==="
            docker compose run --rm --no-deps \
              -v "$APP_DIR/data:/app/data" \
              -v "$APP_DIR/scripts:/app/scripts:ro" \
              -w /app \
              pipeline node /app/scripts/force-face-check.mjs

            echo "=== FORCE ONE via scheduler (CRON_RUN_ON_START, survives SSH) ==="
            # docker compose run under SSH was SIGTERM'd (~exit 143) mid-pipeline.
            # Long-running service + CRON_RUN_ON_START is more reliable.
            upsert CRON_RUN_ON_START true
            upsert DRY_RUN false
            # Clear today's fired flags so catch-up can run, keep times if valid
            if [ -f data/daily-schedule.json ]; then
              node -e "
                const fs=require('fs');
                const p='data/daily-schedule.json';
                try {
                  const j=JSON.parse(fs.readFileSync(p,'utf8'));
                  j.fired=[];
                  fs.writeFileSync(p, JSON.stringify(j,null,2));
                  console.log('cleared fired slots for', j.date, j.times);
                } catch(e) { console.warn(e.message); }
              " || true
            fi
            chown -R 10001:10001 data 2>/dev/null || true
            docker compose up -d --force-recreate
            sleep 8
            docker compose ps -a || true

            echo "=== Polling logs for publish (up to 25 min) ==="
            ok=0
            for i in $(seq 1 75); do
              sleep 20
              logs=$(docker compose logs --tail=120 2>&1 || true)
              echo "--- poll $i ---"
              echo "$logs" | tail -n 15
              if echo "$logs" | grep -qE '"published": true|status.: .success|publish succeeded|OK provider='; then
                if echo "$logs" | grep -qE 'publish succeeded|"published": true|status.: .success'; then
                  echo "FOUND publish signal"
                  ok=1
                  break
                fi
              fi
              # Explicit failure of all articles this run (will still retry via slots)
              if echo "$logs" | grep -q 'Pipeline completed' && echo "$logs" | grep -q '"published": false'; then
                echo "Pipeline finished without publish this cycle — keep waiting for slot retry/guarantee"
              fi
            done

            upsert CRON_RUN_ON_START false
            docker compose up -d || true
            docker compose logs --tail=80 2>&1 || true
            if [ "$ok" != "1" ]; then
              echo "::warning::No confirmed publish within poll window — check container logs / next slot"
              # do not fail hard: scheduler still running for daily 3–6 slots
            else
              echo "=== FORCE ONE POST: publish detected ==="
            fi
            echo "=== FORCE ONE POST DONE ==="
