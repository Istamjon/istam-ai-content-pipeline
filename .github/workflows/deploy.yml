# Auto-deploy to VDS after CI succeeds on main.
#
# Secrets: VDS_HOST, VDS_USER, VDS_SSH_KEY
# Optional: VDS_PORT (22), VDS_PATH (/root/istam-ai-content-pipeline)

name: Deploy VDS

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vds
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VDS
    runs-on: ubuntu-latest
    timeout-minutes: 35
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push')

    steps:
      - name: Check deploy secrets
        env:
          VDS_HOST: ${{ secrets.VDS_HOST }}
          VDS_USER: ${{ secrets.VDS_USER }}
          VDS_SSH_KEY: ${{ secrets.VDS_SSH_KEY }}
        run: |
          missing=0
          [ -z "$VDS_HOST" ] && echo "Missing secret: VDS_HOST" && missing=1
          [ -z "$VDS_USER" ] && echo "Missing secret: VDS_USER" && missing=1
          [ -z "$VDS_SSH_KEY" ] && echo "Missing secret: VDS_SSH_KEY" && missing=1
          if [ "$missing" -ne 0 ]; then
            echo "::error::Add VDS_HOST, VDS_USER, VDS_SSH_KEY in repo Settings → Secrets"
            exit 1
          fi
          echo "Secrets present"

      - name: Deploy over SSH (pull, no-cache build, health check)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VDS_HOST }}
          username: ${{ secrets.VDS_USER }}
          key: ${{ secrets.VDS_SSH_KEY }}
          port: ${{ secrets.VDS_PORT || 22 }}
          command_timeout: 30m
          script_stop: true
          script: |
            set -euo pipefail
            APP_DIR="${{ secrets.VDS_PATH }}"
            if [ -z "$APP_DIR" ]; then
              APP_DIR="$HOME/istam-ai-content-pipeline"
            fi
            echo "=== Deploy dir: $APP_DIR ==="
            cd "$APP_DIR"

            echo "=== git ==="
            git remote -v
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            echo "HEAD=$(git rev-parse --short HEAD)"
            git log -1 --oneline
            echo "--- Dockerfile tail ---"
            tail -n 20 Dockerfile
            echo "--- package.json dotenv ---"
            grep -n dotenv package.json || true

            echo "=== .env present? ==="
            if [ ! -f .env ]; then
              echo "WARN: .env missing — creating from .env.example (fill secrets later)"
              cp -n .env.example .env || cp .env.example .env
            fi
            ls -la .env data 2>/dev/null || true
            mkdir -p data/tokens data/images
            # container runs as uid 10001
            chown -R 10001:10001 data 2>/dev/null || true

            echo "=== docker compose down + build --no-cache ==="
            docker compose down || true
            docker compose build --no-cache --pull
            docker compose up -d --force-recreate

            echo "=== wait 12s for crash loops ==="
            sleep 12

            echo "=== ps ==="
            docker compose ps -a

            STATUS=$(docker inspect -f '{{.State.Status}}' istam-ai-pipeline 2>/dev/null || echo missing)
            EXIT=$(docker inspect -f '{{.State.ExitCode}}' istam-ai-pipeline 2>/dev/null || echo na)
            RESTART=$(docker inspect -f '{{.RestartCount}}' istam-ai-pipeline 2>/dev/null || echo na)
            echo "status=$STATUS exit=$EXIT restarts=$RESTART"

            echo "=== logs (last 80) ==="
            docker compose logs --tail=80 || true

            if [ "$STATUS" != "running" ]; then
              echo "::error::Container not running after deploy (status=$STATUS)"
              exit 1
            fi
            if [ "$RESTART" != "0" ] && [ "$RESTART" != "na" ]; then
              # allow 0 only; any restart means crash
              if [ "${RESTART:-0}" -gt 0 ] 2>/dev/null; then
                echo "::error::Container restarted ${RESTART} times — still crashing"
                exit 1
              fi
            fi

            # live probe: dotenv inside image
            echo "=== probe dotenv in image ==="
            docker compose exec -T pipeline node --input-type=module -e "import 'dotenv/config'; console.log('dotenv-runtime-ok')" \
              || docker run --rm --entrypoint node istam-ai-content-pipeline:latest --input-type=module -e "import 'dotenv/config'; console.log('dotenv-image-ok')"

            echo "=== DEPLOY HEALTHY ==="
