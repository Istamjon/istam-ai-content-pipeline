# Auto-deploy to VDS after CI succeeds on main.
#
# Secrets: VDS_HOST, VDS_USER, VDS_SSH_KEY
# Optional: VDS_PORT (22), VDS_PATH (/root/istam-ai-content-pipeline)

name: Deploy VDS

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vds
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VDS
    runs-on: ubuntu-latest
    timeout-minutes: 35
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push')

    steps:
      - name: Check deploy secrets
        env:
          VDS_HOST: ${{ secrets.VDS_HOST }}
          VDS_USER: ${{ secrets.VDS_USER }}
          VDS_SSH_KEY: ${{ secrets.VDS_SSH_KEY }}
        run: |
          missing=0
          [ -z "$VDS_HOST" ] && echo "Missing secret: VDS_HOST" && missing=1
          [ -z "$VDS_USER" ] && echo "Missing secret: VDS_USER" && missing=1
          [ -z "$VDS_SSH_KEY" ] && echo "Missing secret: VDS_SSH_KEY" && missing=1
          if [ "$missing" -ne 0 ]; then
            echo "::error::Add VDS_HOST, VDS_USER, VDS_SSH_KEY in repo Settings → Secrets"
            exit 1
          fi
          echo "Secrets present"

      - name: Deploy over SSH (pull + scripts/vds-deploy.sh)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VDS_HOST }}
          username: ${{ secrets.VDS_USER }}
          key: ${{ secrets.VDS_SSH_KEY }}
          port: ${{ secrets.VDS_PORT || 22 }}
          command_timeout: 30m
          script_stop: true
          script: |
            set -euo pipefail
            APP_DIR="${{ secrets.VDS_PATH }}"
            if [ -z "$APP_DIR" ]; then
              APP_DIR="$HOME/istam-ai-content-pipeline"
            fi
            echo "=== Deploy dir: $APP_DIR ==="
            cd "$APP_DIR"
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            echo "HEAD=$(git rev-parse --short HEAD)"
            chmod +x scripts/vds-deploy.sh
            # Already at origin/main; script re-fetches for safety
            bash scripts/vds-deploy.sh
